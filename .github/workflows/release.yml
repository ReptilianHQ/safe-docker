name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (for manual runs, e.g. v0.3.0)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote-and-release:
    name: Promote image and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF_NAME='${{ inputs.version }}'
          else
            REF_NAME='${{ github.ref_name }}'
          fi

          VERSION=${REF_NAME#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote published SHA image to release tags
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SOURCE_TAG=sha-$(echo "${GITHUB_SHA}" | cut -c1-7)

          docker buildx imagetools inspect ${IMAGE}:${SOURCE_TAG}

          docker buildx imagetools create \
            -t ${IMAGE}:${{ steps.version.outputs.version }} \
            -t ${IMAGE}:${{ steps.version.outputs.minor }} \
            -t ${IMAGE}:${{ steps.version.outputs.major }} \
            ${IMAGE}:${SOURCE_TAG}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.ref_name }}
          generate_release_notes: true
