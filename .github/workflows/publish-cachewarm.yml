name: Publish Docker image (cachewarm)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  VARIANT: cachewarm

concurrency:
  group: publish-cachewarm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tidy-if-needed:
    name: Tidy modules if needed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.tidy.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Tidy dependencies and detect drift
        id: tidy
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit module file updates
        if: steps.tidy.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git commit -m "chore: tidy go modules"
          git push

  lint:
    name: Lint
    needs: [tidy-if-needed]
    if: github.event_name == 'workflow_dispatch' || needs.tidy-if-needed.outputs.changed != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  test:
    name: Test
    needs: [tidy-if-needed]
    if: github.event_name == 'workflow_dispatch' || needs.tidy-if-needed.outputs.changed != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race ./...

  warm-amd64-cache:
    name: Warm amd64 Docker cache
    needs: [tidy-if-needed]
    if: github.event_name == 'workflow_dispatch' || needs.tidy-if-needed.outputs.changed != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Warm amd64 build cache through builder stage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: build
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=publish-cachewarm-amd64
          cache-to: type=gha,mode=max,scope=publish-cachewarm-amd64

  warm-arm64-cache:
    name: Warm arm64 Docker cache
    needs: [tidy-if-needed]
    if: github.event_name == 'workflow_dispatch' || needs.tidy-if-needed.outputs.changed != 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Warm arm64 build cache through builder stage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: build
          push: false
          platforms: linux/arm64
          cache-from: type=gha,scope=publish-cachewarm-arm64
          cache-to: type=gha,mode=max,scope=publish-cachewarm-arm64

  build-amd64:
    name: Build amd64 image
    needs: [lint, test, warm-amd64-cache]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      branch_tag: ${{ steps.meta.outputs.branch_tag }}
      latest_tag: ${{ steps.meta.outputs.latest_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA_TAG="sha-$(echo \"${GITHUB_SHA}\" | cut -c1-7)-${{ env.VARIANT }}"
          BRANCH_TAG="main-${{ env.VARIANT }}"
          LATEST_TAG="latest-${{ env.VARIANT }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}-amd64
          cache-from: type=gha,scope=publish-cachewarm-amd64
          cache-to: type=gha,mode=max,scope=publish-cachewarm-amd64

  build-arm64:
    name: Build arm64 image
    needs: [lint, test, warm-arm64-cache]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      branch_tag: ${{ steps.meta.outputs.branch_tag }}
      latest_tag: ${{ steps.meta.outputs.latest_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA_TAG="sha-$(echo \"${GITHUB_SHA}\" | cut -c1-7)-${{ env.VARIANT }}"
          BRANCH_TAG="main-${{ env.VARIANT }}"
          LATEST_TAG="latest-${{ env.VARIANT }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}-arm64
          cache-from: type=gha,scope=publish-cachewarm-arm64
          cache-to: type=gha,mode=max,scope=publish-cachewarm-arm64

  publish-manifest:
    name: Publish multi-arch manifest
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest tags
        run: |
          IMAGE="${{ needs.build-amd64.outputs.image }}"
          SHA_TAG="${{ needs.build-amd64.outputs.sha_tag }}"
          BRANCH_TAG="${{ needs.build-amd64.outputs.branch_tag }}"
          LATEST_TAG="${{ needs.build-amd64.outputs.latest_tag }}"

          docker buildx imagetools create \
            -t ${IMAGE}:${SHA_TAG} \
            -t ${IMAGE}:${BRANCH_TAG} \
            -t ${IMAGE}:${LATEST_TAG} \
            ${IMAGE}:${SHA_TAG}-amd64 \
            ${IMAGE}:${SHA_TAG}-arm64
