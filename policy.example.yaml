server:
  # Use "0.0.0.0:8080" in containerized deployments for port mapping.
  # Default (bare-metal): 127.0.0.1:8080
  listen_addr: "0.0.0.0:8080"

docker:
  socket_path: "/var/run/docker.sock"
  timeout_seconds: 15
  log_tail_default: 100
  log_tail_max: 500

auth:
  keys:
    # Replace with your actual API key (generate with: openssl rand -hex 32)
    your-api-key-here:
      label: my-agent

# ---------------------------------------------------------------------------
# Project policies
#
# Each project key corresponds to a Docker Compose project name.
# The project key is used for:
#   - compose label matching (com.docker.compose.project)
#   - the -p flag for compose commands (up, down, recreate, build)
#
# API: /v1/projects/{project}/services/{service}/{action}
# ---------------------------------------------------------------------------

projects:
  # Project key = Docker Compose project name
  myproject:
    # Path to docker-compose.yml (default: /project/docker-compose.yml)
    # Mount the project root read-only at /project for builds to work.
    compose_file: /project/docker-compose.yml
    services:
      # Service key = Docker Compose service name
      api:
        actions: [status, logs, restart, up, down]

      worker:
        actions: [status, logs, restart, up, down]

      # Dangerous actions require explicit opt-in
      app:
        actions: [status, logs, restart, recreate, build]
        dangerous: true

      # Explicit container name (only if it differs from compose naming)
      postgres:
        container: myproject-postgres-1  # Optional override
        actions: [status, logs]

      safe-docker:
        actions: [status, logs]

  # Example: second project
  # other-stack:
  #   services:
  #     api:
  #       actions: [status, logs, restart]
  #     postgres:
  #       actions: [status, logs]

logging:
  level: info
  format: json

# ---------------------------------------------------------------------------
# Human-in-the-loop (HITL) approval for dangerous actions
#
# When webhook_url is set, dangerous actions (recreate, build) are intercepted:
#   1. A one-time approval token is generated and POSTed to webhook_url
#   2. The caller receives HTTP 202 pending_approval
#   3. A human reviews the webhook payload and calls POST /v1/approve
#      with {"approval_key": "<token>"} to execute the action
#
# If webhook_url is empty, dangerous actions return HTTP 403.
#
# approval:
#   webhook_url: "https://hooks.example.com/safe-docker/approve"
#   webhook_secret: "your-secret-here"  # HMAC-SHA256 signing key (X-Safe-Docker-Signature header)
#   token_ttl_seconds: 120      # How long the token is valid (default: 120)
#   token_ttl_max_seconds: 600  # Maximum TTL cap (default: 600)
